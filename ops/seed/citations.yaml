# Synthetic policy_citations corpus (schema plan section 5.6).
# Every excerpt is invented neutral checklist-shaped text labelled
# "(Synthetic Demo Reference)". No real DTMO/JTR/DoD/FMR/checklist text is
# loaded. Each topic in schema plan section 5.6 has at least one citation.
citations:
  # valid_receipt
  - citation_id: CITE-RECEIPT-001
    source_identifier: synthetic_dtmo_checklist_demo_v1
    topic: valid_receipt
    excerpt_text: |
      Synthetic checklist note: a valid demo receipt is expected to show the
      vendor label, the date of the expense, and either a paid amount or a
      payment indicator. (Synthetic Demo Reference)
    retrieval_anchor: valid receipt vendor date paid amount
    applicability_note: |
      Use when a line item lacks an attached receipt or when the attached
      evidence has missing date, vendor, or paid-amount fields.
  - citation_id: CITE-RECEIPT-002
    source_identifier: synthetic_dtmo_checklist_demo_v1
    topic: valid_receipt
    excerpt_text: |
      Synthetic checklist note: handwritten or local-paper receipts may be
      acceptable for review when the legibility, vendor, and amount cues are
      visible to the reviewer. (Synthetic Demo Reference)
    retrieval_anchor: handwritten local paper receipt legibility cue
    applicability_note: |
      Use when the attached evidence is a handwritten or local-paper receipt
      and the reviewer must judge legibility.

  # lodging_documentation
  - citation_id: CITE-LODGE-001
    source_identifier: synthetic_dtmo_checklist_demo_v1
    topic: lodging_documentation
    excerpt_text: |
      Synthetic checklist note: lodging documentation is expected to identify
      the lodging vendor, the night-by-night date coverage, and the line-item
      total per night. (Synthetic Demo Reference)
    retrieval_anchor: lodging documentation vendor night coverage line item total
    applicability_note: |
      Use when a lodging line is missing receipt evidence or the dates do not
      cover the declared trip nights.

  # transportation_documentation
  - citation_id: CITE-TRANS-001
    source_identifier: synthetic_dtmo_checklist_demo_v1
    topic: transportation_documentation
    excerpt_text: |
      Synthetic checklist note: transportation documentation should show the
      origin, destination, date of travel, and the demo amount visible on
      the face of the receipt. (Synthetic Demo Reference)
    retrieval_anchor: transportation documentation origin destination date amount
    applicability_note: |
      Use when a transport line lacks a receipt or when the origin or
      destination on the evidence does not align with the declared trip.

  # cash_atm_reconstruction
  - citation_id: CITE-CASH-001
    source_identifier: synthetic_dtmo_checklist_demo_v1
    topic: cash_atm_reconstruction
    excerpt_text: |
      Synthetic checklist note: cash and ATM line items should be paired with
      a reviewer-visible reconstruction sequence so the demo packet shows what
      cash was withdrawn and how it relates to declared meals or incidentals.
      (Synthetic Demo Reference)
    retrieval_anchor: cash atm reconstruction sequence withdrawal pairing
    applicability_note: |
      Use when cash or ATM line items appear without a clear reconstruction
      narrative.

  # currency_exchange
  - citation_id: CITE-FX-001
    source_identifier: synthetic_dtmo_checklist_demo_v1
    topic: currency_exchange
    excerpt_text: |
      Synthetic checklist note: currency-exchange line items should display
      the foreign currency code and a synthetic exchange rate to the demo
      base currency, with the reviewer free to confirm the rate basis.
      (Synthetic Demo Reference)
    retrieval_anchor: currency exchange foreign rate basis reviewer
    applicability_note: |
      Use when a packet contains foreign-currency line items and the rate
      basis is not visible.

  # funding_reference_format
  - citation_id: CITE-LOA-001
    source_identifier: synthetic_dtmo_checklist_demo_v1
    topic: funding_reference_format
    excerpt_text: |
      Synthetic checklist note: a demo funding reference label is expected to
      follow a parseable LOA-DEMO-FY##-#### shape. Demo strings that fall
      outside that shape should be reviewed for clarity. (Synthetic Demo
      Reference)
    retrieval_anchor: funding reference loa demo format ambiguous
    applicability_note: |
      Use when the funding reference label on a packet does not match the
      expected demo shape.

  # duplicate_charge_review
  - citation_id: CITE-DUP-001
    source_identifier: synthetic_dtmo_checklist_demo_v1
    topic: duplicate_charge_review
    excerpt_text: |
      Synthetic checklist note: when two lodging or transport lines cover the
      same demo date, the reviewer should compare them side by side. Demo
      packets do not infer dual-lodging authorization. (Synthetic Demo
      Reference)
    retrieval_anchor: duplicate charge lodging overlap side by side reviewer
    applicability_note: |
      Use when two line items appear to cover the same date or service.

  # date_window_coherence
  - citation_id: CITE-DATE-001
    source_identifier: synthetic_dtmo_checklist_demo_v1
    topic: date_window_coherence
    excerpt_text: |
      Synthetic checklist note: every line item is expected to fall inside
      the declared trip window. Lines whose expense date sits outside the
      window are surfaced for reviewer reconstruction. (Synthetic Demo
      Reference)
    retrieval_anchor: trip window expense date out of range reconstruction
    applicability_note: |
      Use when a line item's expense_date falls outside the trip window.

  # oconus_vendor_edge
  - citation_id: CITE-OCONUS-001
    source_identifier: synthetic_dtmo_checklist_demo_v1
    topic: oconus_vendor_edge
    excerpt_text: |
      Synthetic checklist note: synthetic OCONUS vendors that do not produce
      standardized receipts should be flagged for reviewer attention; the
      reviewer can then ask the traveler for an alternative reconstruction.
      (Synthetic Demo Reference)
    retrieval_anchor: oconus vendor edge non standard receipt reviewer
    applicability_note: |
      Use for austere or OCONUS vendor lines where the receipt is
      handwritten, missing, or not standardized.

  # general_review_checklist
  - citation_id: CITE-CHECKLIST-001
    source_identifier: synthetic_dtmo_checklist_demo_v1
    topic: general_review_checklist
    excerpt_text: |
      Synthetic checklist note: when a packet's narrative does not yet
      explain a particular line, the reviewer can either ask the traveler
      for context or label the gap as needing reviewer attention. Demo
      reference only. (Synthetic Demo Reference)
    retrieval_anchor: general review checklist narrative gap reviewer
    applicability_note: |
      Use when the trip narrative is incomplete or when paperwork math does
      not reconcile cleanly.
  - citation_id: CITE-CHECKLIST-002
    source_identifier: synthetic_demo_reference_v1
    topic: general_review_checklist
    excerpt_text: |
      Synthetic checklist note: forced-audit cues on a synthetic demo packet
      remind the reviewer to verify line categorization and the matching
      receipt evidence side by side. (Synthetic Demo Reference)
    retrieval_anchor: forced audit cue line categorization receipt evidence
    applicability_note: |
      Use when a demo packet carries a forced-audit cue.
  - citation_id: CITE-AMT-001
    source_identifier: synthetic_dtmo_checklist_demo_v1
    topic: general_review_checklist
    excerpt_text: |
      Synthetic checklist note: when a line-item demo amount differs from the
      amount visible on the synthetic receipt, the reviewer should ask the
      traveler for a reconciliation note before the demo packet moves
      forward. (Synthetic Demo Reference)
    retrieval_anchor: line item amount mismatch receipt reconciliation note
    applicability_note: |
      Use when a line item amount does not match the synthetic receipt
      amount.
