findings:
  - category: forced_audit_receipt_review
    severity: medium
    confidence: high
    needs_human_review: false
    summary: |
      The synthetic packet carries a forced-audit cue requesting category
      and receipt review on the line items.
    explanation: |
      The forced-audit cue surfaces from the packet's pre-existing-flags
      array. The reviewer is asked to verify line categorization against
      the receipt evidence.
    suggested_question: |
      Could the traveler confirm each line's category matches the synthetic
      receipt vendor and amount?
    primary_citation_id: CITE-CHECKLIST-002
    packet_evidence_pointer:
      line_item_id: V-1004-LI-2
      excerpt_hint: forced-audit cue on synthetic packet
    signal_links:
      - high_risk_mcc_demo
  - category: ambiguous_loa_or_funding_reference
    severity: medium
    confidence: high
    needs_human_review: false
    summary: |
      The funding-reference label on the synthetic packet is ambiguous.
    explanation: |
      The literal funding_reference_label is FUND-POT-DEMO-AMBIG, which
      does not match the parseable LOA-DEMO-FY26-#### shape. The reviewer
      can ask for the intended funding reference.
    suggested_question: |
      Could the traveler confirm the intended funding reference and update
      the synthetic packet?
    primary_citation_id: CITE-LOA-001
    packet_evidence_pointer:
      line_item_id: V-1004-LI-1
      excerpt_hint: funding_reference_label = FUND-POT-DEMO-AMBIG
    signal_links: []
  - category: miscategorized_line_item
    severity: medium
    confidence: high
    needs_human_review: false
    summary: |
      Line 2 is filed as meals but the synthetic receipt shows a hotel
      charge.
    explanation: |
      The line vendor_label is Hotel Coastal Demo and the receipt vendor
      label on the evidence agrees, but the line category is meals. The
      reviewer can ask the traveler to recategorize the line.
    suggested_question: |
      Could the traveler confirm whether line 2 should be filed under
      lodging rather than meals?
    primary_citation_id: CITE-CHECKLIST-002
    packet_evidence_pointer:
      line_item_id: V-1004-LI-2
      evidence_ref_id: V-1004-LI-2-EV-1
      excerpt_hint: line category=meals vs evidence vendor=Hotel
    signal_links:
      - high_risk_mcc_demo
  - category: evidence_quality_concern
    severity: low
    confidence: medium
    needs_human_review: false
    summary: |
      The incidentals line has subtotal, tax, and claimed amount that do
      not reconcile cleanly on the synthetic receipt face.
    explanation: |
      The line claimed amount is 4400 minor units and the receipt face
      amount is 4100 minor units. The reviewer can ask the traveler for a
      reconstruction note.
    suggested_question: |
      Could the traveler confirm how the incidentals line total was
      calculated?
    primary_citation_id: CITE-AMT-001
    packet_evidence_pointer:
      line_item_id: V-1004-LI-7
      evidence_ref_id: V-1004-LI-7-EV-1
      excerpt_hint: claim 44.00 vs receipt 41.00
    signal_links:
      - unusual_amount
