external_anomaly_signals:
  - signal_type: duplicate_payment_risk
    confidence: medium
    rationale_text: |
      Two synthetic lodging-line charges within the trip window overlap on
      Feb 10. Demo signal only; not an official finding.
    scenario_slug: lodging_overlap
  - signal_type: unusual_amount
    confidence: low
    rationale_text: |
      One synthetic transport line's claimed amount differs from its
      synthetic receipt amount by more than the demo tolerance. Review
      prompt only.
    scenario_slug: transport_amount_drift
findings:
  - category: duplicate_or_multiple_charge
    severity: medium
    confidence: medium
    needs_human_review: false
    summary: |
      Two synthetic lodging rows overlap on Feb 10 and need side-by-side
      review.
    explanation: |
      The packet contains two lodging charges on the same synthetic trip
      night. This is a duplicate or multiple-charge review surface only;
      it is not a conclusion that either line is improper.
    suggested_question: |
      Do the two lodging rows describe separate stays for the same night, or
      should the packet include more context about the overlap?
    primary_citation_id: CITE-DUP-001
    packet_evidence_pointer:
      line_item_id: V-1003-LI-2
      excerpt_hint: lodging line 2 overlaps Feb 10 with lodging line 1
    signal_links:
      - duplicate_payment_risk
  - category: amount_mismatch
    severity: medium
    confidence: high
    needs_human_review: false
    summary: |
      The transport line's claimed demo amount differs from the synthetic
      receipt amount.
    explanation: |
      The claimed transport amount and the amount visible on the synthetic
      receipt do not reconcile on their face. The reviewer can ask the
      traveler for a reconciliation note.
    suggested_question: |
      Could the traveler confirm the transport amount and provide the
      breakdown if the receipt total has changed?
    primary_citation_id: CITE-AMT-001
    packet_evidence_pointer:
      line_item_id: V-1003-LI-5
      evidence_ref_id: V-1003-LI-5-EV-1
      excerpt_hint: claim 240.00 vs receipt 218.00
    signal_links:
      - unusual_amount
  - category: story_coherence_break
    severity: low
    confidence: medium
    needs_human_review: false
    summary: |
      The trip narrative does not yet explain the lodging overlap on Feb 10.
    explanation: |
      The declared trip sequence explains most dates, but Feb 10 has two
      synthetic lodging rows without enough narrative context for
      reconstruction.
    suggested_question: |
      Could the traveler clarify the trip leg covering the second lodging
      night?
    primary_citation_id: CITE-CHECKLIST-001
    packet_evidence_pointer:
      line_item_id: V-1003-LI-2
      excerpt_hint: trip narrative does not yet account for second lodging
    signal_links: []
  - category: story_coherence_break
    severity: low
    confidence: low
    needs_human_review: true
    summary: |
      Dual-lodging authority cannot be inferred from the synthetic packet.
    explanation: |
      Dual-lodging can be legitimate, but the synthetic packet does not show
      enough context for the system to characterize the second lodging line.
      The reviewer is the right decision-maker here.
    suggested_question: |
      Was dual-lodging authorized for the Feb 10 leg, or is one of these
      lines an inadvertent duplicate?
    primary_citation_id: CITE-LODGE-001
    packet_evidence_pointer:
      line_item_id: V-1003-LI-2
      excerpt_hint: needs_human_review on second lodging line
    signal_links: []
