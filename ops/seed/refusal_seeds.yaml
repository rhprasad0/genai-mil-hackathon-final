# Two seeded refusals from schema plan section 7.4. The generator emits
# matching workflow_events rows of event_type=refusal. Every rejected
# requested-status value is stored under rationale_metadata.rejected_input
# so the validator can verify it is typed as rejected, not as system-authored
# narrative.
refusals:
  - voucher_id: V-1001
    tool_name: set_voucher_review_status
    target_kind: voucher
    target_id: V-1001
    occurred_on: 2026-01-12
    occurred_offset_minutes: 30
    rationale: |
      Demo reviewer attempted to set the synthetic voucher review_status to a
      value that implies official action. The system refused; demo state is
      unchanged.
    rejected_input: approved
    refusal_reason: |
      Synthetic-demo refusal: review_status values that imply official
      approval, denial, certification, return, cancellation, amendment,
      submission, payability, or external contact are rejected. The model
      can move review work forward, but it cannot move money or change
      official travel-system state.
  - voucher_id: V-1010
    tool_name: prepare_ao_review_brief
    target_kind: voucher
    target_id: V-1010
    occurred_on: 2026-04-08
    occurred_offset_minutes: 45
    rationale: |
      Demo reviewer asked the synthetic brief to characterize a line item as
      fraudulent. The system refused; brief content uses neutral vocabulary
      only.
    rejected_input: characterize_line_as_fraudulent
    refusal_reason: |
      Synthetic-demo refusal: AO Radar does not characterize travelers,
      vendors, or transactions as fraudulent, abusive, in misuse, or in
      misconduct. Use the spec-permitted vocabulary (anomaly, documentation
      gap, evidence needing closer reviewer attention, needs human review).
